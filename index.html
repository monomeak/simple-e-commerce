<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Clothing Store</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>Mono Clothing Store</h1>
      <p>Simple e-commerce website for learning</p>

      <button>Login</button>
      <button>Register</button>
    </header>

    <section class="cart-section">
      <h2>Shopping Cart</h2>
      <p>Total Items: <span id="cart-count">0</span></p>
      <p>Total Price: $<span id="cart-total">0</span></p>
    </section>

    <main>
      <h2>Products</h2>

      <div class="product-container" id="product-container">
        <!-- Products will be added by JavaScript -->
      </div>
    </main>
    <footer>2026 - Web Team</footer>

    <script src="script.js"></script>
  </body>
</html>
